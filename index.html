<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>提出RPG</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family:sans-serif;
  background:#0f172a;
  color:white;
  padding:20px;
}
.card{
  background:#1e293b;
  padding:20px;
  border-radius:20px;
  margin-bottom:20px;
}
button{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
  margin:5px;
}
input{
  padding:10px;
  border-radius:10px;
  border:none;
}
img{
  width:180px;
  border-radius:20px;
}
</style>
</head>
<body>

<div class="card">
  <h1>提出RPG</h1>
  <input id="studentName" placeholder="生徒名">
  <button onclick="addStudent()">追加</button>
</div>

<div class="card">
  <h2>QR読み取り</h2>
  <div id="reader" style="width:300px"></div>
</div>

<div class="card">
  <h2>生徒一覧</h2>
  <div id="studentList"></div>
</div>

<script>
const images = {
  villager: "https://i.imgur.com/3VesM2P.jpeg",
  adventurer: "https://i.imgur.com/GQwA5bP.jpeg",
  warrior: "https://i.imgur.com/WQh0q3g.jpeg",
  hero: "https://i.imgur.com/x5qY6hV.jpeg",
  sage: "https://i.imgur.com/4rA7kJd.jpeg",
  legend: "https://i.imgur.com/k0kqTlf.jpeg"
};

let students = JSON.parse(localStorage.getItem("students") || "[]");

function titleByLevel(level){
  if(level>=10) return ["伝説の勇者",images.legend];
  if(level>=8) return ["賢者",images.sage];
  if(level>=6) return ["勇者",images.hero];
  if(level>=4) return ["戦士",images.warrior];
  if(level>=2) return ["冒険者",images.adventurer];
  return ["村人",images.villager];
}

function save(){
  localStorage.setItem("students",JSON.stringify(students));
}

function addStudent(){
  const name=document.getElementById("studentName").value;
  const id=crypto.randomUUID();

  students.push({
    id,
    name,
    xp:0,
    level:1,
    lastScan:"",
    subjects:{
      数学:0,
      理科:0,
      社会:0,
      英語:0,
      国語:0,
      その他:0
    }
  });

  save();
  render();
}

function addXP(id){
  const s=students.find(x=>x.id===id);
  const today=new Date().toDateString();

  if(s.lastScan===today){
    alert("今日は読み取り済み");
    return;
  }

  s.xp+=5;
  s.level=Math.floor(s.xp/20)+1;
  s.lastScan=today;

  save();
  render();
  showStatus(s);
}

function showStatus(student){
  const [title,img]=titleByLevel(student.level);

  const div=document.createElement("div");
  div.style.position="fixed";
  div.style.inset="0";
  div.style.background="rgba(0,0,0,0.8)";
  div.style.display="flex";
  div.style.alignItems="center";
  div.style.justifyContent="center";
  div.innerHTML=`
    <div style="background:#1e293b;padding:30px;border-radius:20px;text-align:center;">
      <img src="${img}">
      <h2>${student.name}</h2>
      <h3>Lv.${student.level}</h3>
      <h3>${title}</h3>
    </div>
  `;
  document.body.appendChild(div);

  setTimeout(()=>div.remove(),10000);
}

function render(){
  const list=document.getElementById("studentList");
  list.innerHTML="";

  students.forEach(s=>{
    const [title,img]=titleByLevel(s.level);

    const div=document.createElement("div");
    div.className="card";
    div.innerHTML=`
      <img src="${img}">
      <h3>${s.name}</h3>
      <p>Lv.${s.level}</p>
      <p>${title}</p>
      <p>${s.xp} XP</p>
      <canvas id="qr-${s.id}"></canvas>
    `;

    list.appendChild(div);

    QRCode.toCanvas(
      document.getElementById(`qr-${s.id}`),
      s.id,
      {width:120}
    );
  });
}

render();

const scanner=new Html5Qrcode("reader");
scanner.start(
  {facingMode:"environment"},
  {fps:10,qrbox:250},
  text=>addXP(text)
);
</script>

</body>
</html>
