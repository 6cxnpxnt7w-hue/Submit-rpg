<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>提出RPG 完成版</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:linear-gradient(180deg,#0f172a,#1e293b);
    color:white;
    padding:20px;
}
.card{
    background:rgba(255,255,255,0.1);
    padding:20px;
    border-radius:20px;
    margin-bottom:20px;
}
button{
    padding:10px 15px;
    border:none;
    border-radius:10px;
    margin:5px;
    background:#3b82f6;
    color:white;
}
input{
    padding:10px;
    border-radius:10px;
    border:none;
}
.student-card{
    border:1px solid rgba(255,255,255,0.2);
    border-radius:20px;
    padding:20px;
    margin:20px 0;
}
.rank-img{
    width:180px;
    border-radius:20px;
}
</style>
</head>
<body>

<h1>提出RPG 完成版</h1>

<div class="card">
    <h2>生徒登録</h2>
    <input id="studentName" placeholder="生徒名">
    <button onclick="addStudent()">追加</button>
</div>

<div class="card">
    <h2>QR読み取り</h2>
    <div id="reader" style="width:300px"></div>
</div>

<div class="card">
    <h2>生徒一覧</h2>
    <div id="studentList"></div>
</div>

<script>
const teacherKey = new URLSearchParams(location.search).get("teacher") || "default";
const STORAGE_KEY = "submit_rpg_" + teacherKey;

const rankImages = {
    "村人":"https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=400",
    "冒険者":"https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=400",
    "戦士":"https://images.unsplash.com/photo-1517841905240-472988babdf9?w=400",
    "勇者":"https://images.unsplash.com/photo-1518770660439-4636190af475?w=400",
    "賢者":"https://images.unsplash.com/photo-1502082553048-f009c37129b9?w=400",
    "伝説の勇者":"https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?w=400"
};

let students = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

function saveData(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(students));
}

function getRank(level){
    if(level >= 10) return "伝説の勇者";
    if(level >= 8) return "賢者";
    if(level >= 6) return "勇者";
    if(level >= 4) return "戦士";
    if(level >= 2) return "冒険者";
    return "村人";
}

function addStudent(){
    const name = document.getElementById("studentName").value;
    if(!name) return;

    students.push({
        id: crypto.randomUUID(),
        name,
        xp:0,
        level:1,
        subjects:{
            数学:0,
            理科:0,
            社会:0,
            英語:0,
            国語:0,
            その他:0
        }
    });

    saveData();
    renderStudents();
}

function addXP(id){
    const student = students.find(s=>s.id===id);
    student.xp += 5;
    student.level = Math.floor(student.xp/20)+1;
    saveData();
    renderStudents();
    showLevelScreen(student);
}

function showLevelScreen(student){
    const rank = getRank(student.level);

    const div = document.createElement("div");
    div.style.position="fixed";
    div.style.inset="0";
    div.style.background="rgba(0,0,0,0.9)";
    div.style.display="flex";
    div.style.justifyContent="center";
    div.style.alignItems="center";

    div.innerHTML=`
        <div style="text-align:center;">
            <img src="${rankImages[rank]}" class="rank-img">
            <h1>${student.name}</h1>
            <h2>Lv.${student.level}</h2>
            <h2>${rank}</h2>
        </div>
    `;

    document.body.appendChild(div);

    setTimeout(()=>{
        div.remove();
    },10000);
}

function renderStudents(){
    const list = document.getElementById("studentList");
    list.innerHTML="";

    students.forEach(student=>{
        const rank = getRank(student.level);

        const div = document.createElement("div");
        div.className="student-card";

        div.innerHTML=`
            <img src="${rankImages[rank]}" class="rank-img"><br>
            <h3>${student.name}</h3>
            <p>Lv.${student.level}</p>
            <p>${rank}</p>
            <p>${student.xp} XP</p>
            <canvas id="qr-${student.id}"></canvas>
        `;

        list.appendChild(div);

        QRCode.toCanvas(
            document.getElementById(`qr-${student.id}`),
            student.id,
            {width:120}
        );
    });
}

renderStudents();

const scanner = new Html5Qrcode("reader");

scanner.start(
    { facingMode:"environment" },
    { fps:10, qrbox:250 },
    (decodedText)=>{
        addXP(decodedText);
    }
);
</script>

</body>
</html>
